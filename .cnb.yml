# Cloud-native development (WebIDE)
$:
  vscode:
    - runner:
        cpus: 16
      docker:
        image: docker.cnb.cool/learningos/oscamp-2026s/oscamp-base-experiment
      services:
        - vscode
        - docker
      stages:
        - name: Install oscamp CLI
          script: cargo install --path cli
